<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="clinton">
    <meta name="description" content="online store">
    <link rel="stylesheet" href="../index.css">
    <title>JProject 3</title>
</head>
<body>
    <header class="header">
        <h3 class="header-heading">shop<span class="header-heading-flow">Flow</span></h3>

        <a href="index.html" class="header-link-orders link">Products</a>

        <div class="cart-link-container">
            <a href="orders.html" class="header-link-cart link">Orders</a>
             <span class="header-link-cart-counter" id="headerLinkCounter"></span>
            
        </div> 
    </header>



    <main class="cart-container" id="cartContainer">
        <h2 id="emptyCartMessage"></h2>
        <h2 id="cartTotal"></h2>

        <section class="cart-products" id="cartProducts">
    
        </section>

        <section class="cart-checkout" id="cartCheckout">
            <button class="button check-out-button" id="checkoutButton">CHECKOUT</button>
        </section>
    </main>



    <footer>
        <p>&copy; <span id="currentYear"></span></p>
    </footer>


    <div id="notification">
        <p id="notificationMessage"></p>
    </div>
</body>
<script src="../JS/cart.js" type="module"></script>
</html>
